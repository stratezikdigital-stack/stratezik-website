<svg xmlns="http://www.w3.org/2000/svg" width="620" height="220" viewBox="0 0 620 220" role="img" aria-labelledby="t d">
  <title id="t">Signals when AI recommends a local business</title>
  <desc id="d">Website facts, corroborating listings and third-party mentions, and query fit.</desc>
  <rect width="620" height="220" fill="#faf7f2"/>
  <rect x="20" y="24" width="180" height="140" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="110" y="52" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#b01030" text-anchor="middle">FIRST-PARTY</text>
  <text x="110" y="76" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Clear site facts</text>
  <text x="110" y="94" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Schema + answers</text>
  <text x="110" y="124" font-family="ui-mono,monospace" font-size="9" fill="#6a6a6a" text-anchor="middle">LocalBusiness,</text>
  <text x="110" y="140" font-family="ui-mono,monospace" font-size="9" fill="#6a6a6a" text-anchor="middle">FAQ, Service</text>
  <rect x="220" y="24" width="180" height="140" rx="8" fill="#f0ebe3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="310" y="52" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#b01030" text-anchor="middle">CORROBORATION</text>
  <text x="310" y="76" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Listings NAP match</text>
  <text x="310" y="94" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Reviews + forums</text>
  <text x="310" y="124" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#4a4a4a" text-anchor="middle">GBP, Yelp,</text>
  <text x="310" y="140" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#4a4a4a" text-anchor="middle">directories</text>
  <rect x="420" y="24" width="180" height="140" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="510" y="52" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#b01030" text-anchor="middle">QUERY FIT</text>
  <text x="510" y="80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Answers the exact</text>
  <text x="510" y="98" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">long question asked</text>
  <text x="510" y="132" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#4a4a4a" text-anchor="middle">Neighbourhoods,</text>
  <text x="510" y="148" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#4a4a4a" text-anchor="middle">services, urgency</text>
  <text x="310" y="198" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#6a6a6a" text-anchor="middle">Schematic summary (not a ChatGPT screenshot).</text>
</svg>
