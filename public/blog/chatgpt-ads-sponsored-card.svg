<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" role="img" aria-labelledby="title desc">
  <title id="title">Schematic of a sponsored recommendation below an assistant reply</title>
  <desc id="desc">Assistant message block above a tinted sponsored card with favicon, headline, and thumbnail.</desc>
  <rect width="640" height="280" fill="#faf7f2"/>
  <rect x="24" y="24" width="592" height="72" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" opacity="0.9"/>
  <text x="40" y="52" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#5c5c5c">Assistant reply (conversation)</text>
  <rect x="40" y="62" width="520" height="8" rx="2" fill="#d4cfc7"/>
  <rect x="40" y="76" width="480" height="8" rx="2" fill="#d4cfc7"/>
  <rect x="24" y="112" width="592" height="144" rx="10" fill="#f0ebe3" stroke="#b01030" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="40" y="134" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#b01030" letter-spacing="0.06em">SPONSORED</text>
  <rect x="40" y="146" width="36" height="36" rx="6" fill="#1a1a1a"/>
  <text x="56" y="168" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#faf7f2" text-anchor="middle">B</text>
  <text x="88" y="166" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Short headline (offer)</text>
  <text x="88" y="186" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#4a4a4a">One-line description + landing page</text>
  <rect x="460" y="146" width="88" height="88" rx="8" fill="#c8c2b8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="504" y="196" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#3a3a3a" text-anchor="middle">Image</text>
  <text x="40" y="248" font-family="ui-mono, monospace" font-size="10" fill="#6a6a6a">Illustrative layout only (not an OpenAI product screenshot).</text>
